name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "31 4 * * 1"

jobs:
  analyze:
    runs-on: macos-15
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          set -euo pipefail
          for candidate in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode.app
          do
            if [ -d "$candidate/Contents/Developer" ]; then
              sudo xcode-select --switch "$candidate/Contents/Developer"
              break
            fi
          done
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun --sdk macosx --show-sdk-version
      - uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual
      - name: Clean SwiftPM build state
        run: rm -rf .build .swiftpm
      - name: Build for CodeQL
        run: swift build -c debug
      - uses: github/codeql-action/analyze@v3
